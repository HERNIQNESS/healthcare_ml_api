<!DOCTYPE html>
<html>
<head>
  <title>Healthcare Predictor</title>
</head>
<body>

<h2>Healthcare Test Result Predictor</h2>

<input id="Age" placeholder="Age"><br>
<input id="Gender" placeholder="Gender"><br>
<input id="Blood Type" placeholder="Blood Type"><br>
<input id="Medical Condition" placeholder="Medical Condition"><br>
<input id="Insurance Provider" placeholder="Insurance Provider"><br>
<input id="Billing Amount" placeholder="Billing Amount"><br>
<input id="Admission Type" placeholder="Admission Type"><br>
<input id="Medication" placeholder="Medication"><br>
<input id="Length of Stay" placeholder="Length of Stay"><br><br>

<button onclick="predict()">Predict</button>

<h3 id="result"></h3>

<script>
async function predict() {

  const data = {
    "Age": parseInt(document.getElementById("Age").value),
    "Gender": document.getElementById("Gender").value,
    "Blood Type": document.getElementById("Blood Type").value,
    "Medical Condition": document.getElementById("Medical Condition").value,
    "Insurance Provider": document.getElementById("Insurance Provider").value,
    "Billing Amount": parseFloat(document.getElementById("Billing Amount").value),
    "Admission Type": document.getElementById("Admission Type").value,
    "Medication": document.getElementById("Medication").value,
    "Length of Stay": parseInt(document.getElementById("Length of Stay").value)
  };

  try {
    const response = await fetch("https://healthcare-ml-api-1.onrender.com/predict", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerText =
      "Prediction: " + result.predicted_test_result;

  } catch (error) {
    document.getElementById("result").innerText =
      "Error connecting to API";
    console.error(error);
  }
}
</script>

</body>
</html>
