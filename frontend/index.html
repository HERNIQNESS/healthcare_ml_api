<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedPredict — Healthcare Test Result Predictor</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0f1e;
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #cbd5e1;
    }

    .header { text-align: center; margin-bottom: 2.5rem; }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #1d6fa5, #2dd4bf);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: #e2e8f0;
    }

    .subtitle {
      font-size: 13px;
      color: #64748b;
      text-transform: uppercase;
    }

    .card {
      background: #111827;
      border-radius: 16px;
      padding: 2rem;
      max-width: 520px;
      margin: 0 auto;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    input, select {
      background: #0d1526;
      border: 1px solid #1e2d45;
      border-radius: 8px;
      padding: 10px;
      color: white;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    .result-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      display: none;
    }

    .show { display: block; }

    .normal { background: #052e16; color: #4ade80; }
    .abnormal { background: #450a0a; color: #f87171; }
    .inconclusive { background: #1c1917; color: #a8a29e; }
    .error { background: #1e1a00; color: #fbbf24; }
  </style>
</head>

<body>

<div class="header">
  <div class="logo-row">
    <div class="logo-icon"></div>
    <span class="brand">MedPredict</span>
  </div>
  <div class="subtitle">Clinical Prediction System</div>
</div>

<div class="card">

  <div class="grid-2">
    <div class="field">
      <label>Age</label>
      <input id="Age" type="number">
    </div>

    <div class="field">
      <label>Gender</label>
      <select id="Gender">
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>
  </div>

  <div class="grid-2">
    <input id="Blood Type" placeholder="Blood Type">
    <input id="Medical Condition" placeholder="Condition">
  </div>

  <div class="grid-2">
    <input id="Admission Type" placeholder="Admission Type">
    <input id="Length of Stay" type="number" placeholder="Days">
  </div>

  <div class="grid-2">
    <input id="Medication" placeholder="Medication">
    <input id="Billing Amount" type="number" placeholder="Amount">
  </div>

  <input id="Insurance Provider" placeholder="Insurance Provider">

  <button class="btn" onclick="predict()">Run Prediction</button>

  <div id="result" class="result-box"></div>

</div>

<script>

const API_URL = "https://healthcare-ml-api-1.onrender.com/predict";

async function predict() {

  const resultBox = document.getElementById("result");

  const data = {
    "Age": parseInt(document.getElementById("Age").value) || 0,
    "Gender": document.getElementById("Gender").value,
    "Blood Type": document.getElementById("Blood Type").value,
    "Medical Condition": document.getElementById("Medical Condition").value,
    "Insurance Provider": document.getElementById("Insurance Provider").value,
    "Billing Amount": parseFloat(document.getElementById("Billing Amount").value) || 0,
    "Admission Type": document.getElementById("Admission Type").value,
    "Medication": document.getElementById("Medication").value,
    "Length of Stay": parseInt(document.getElementById("Length of Stay").value) || 0
  };

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    console.log("API RESPONSE:", result); // 🔥 DEBUG LINE

    let pred = result.predicted_test_result || result.raw_prediction || "Unknown";

    // map numeric → label
    const mapping = {
      "0": "normal",
      "1": "abnormal",
      "2": "inconclusive"
    };

    if (mapping[pred]) {
      pred = mapping[pred];
    }

    resultBox.innerText = "Prediction: " + pred;
    resultBox.className = "result-box show " + pred.toLowerCase();

  } catch (error) {
    resultBox.innerText = "Error connecting to API";
    resultBox.className = "result-box show error";
  }
}

</script>

</body>
</html>
